<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rèn Luyện Thẩm Âm - Trần Cường</title>
    <link rel="stylesheet" href="style.css">
    <script src="Tone.js"></script>
    <script src="vexflow.js"></script>
</head>
<body>

    <h1 class="main-title">Rèn Luyện Thẩm Âm</h1>

    <div id="sheet-wrapper" class="sheet-container">
        <div id="staff"></div>
    </div>

    <div class="controls">
        <div class="tempo-control">
            <span style="font-size: 0.9rem; margin-right: 10px;">Tốc độ:</span>
            <button class="tempo-btn" onclick="updateTempo(-0.1)">-</button>
            <span id="tempo-display">0.6s</span>
            <button class="tempo-btn" onclick="updateTempo(0.1)">+</button>
        </div>
        
        <div class="main-buttons">
            <button id="btn-easy" class="mode-btn" onclick="selectDifficulty('easy')">Đơn Giản</button>
            <button id="btn-hard" class="mode-btn" onclick="selectDifficulty('hard')">Khó Hơn</button>
            <button id="btn-replay" class="action-btn" onclick="replayMusic()">Phát Lại</button>
            <button id="btn-change" class="action-btn" onclick="changeMusic()">Đổi Nhạc Sheet</button>
        </div>

        <div id="status-message" class="status-msg">
            Nhạc Đang Phát Nên Không Thao Tác Khác Nhé Bạn Ơi!...
        </div>
    </div>

    <footer class="footer">
        ---Chúc Các Bạn Rèn Luyện Thành Công. Trần Cường : 0907860662---
    </footer>

    <script src="script.js"></script>
</body>
</html>
